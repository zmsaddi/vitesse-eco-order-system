name: CI

# D-75 + D-78: 13-gate mandatory pack before any PR merge.
# كل gate blocking — branch protection على main يتطلب CI خضراء.

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: CI Quality Gates (13)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      # ─────────────────────────────────────────────
      # Gate 1 — Lockfile enforcement (D-70)
      # ─────────────────────────────────────────────
      - name: Gate 1 — Lockfile check (npm ci)
        run: npm ci

      # ─────────────────────────────────────────────
      # Gate 2 — Lint (ESLint + max-lines: 300)
      # ─────────────────────────────────────────────
      - name: Gate 2 — Lint
        run: npm run lint

      # ─────────────────────────────────────────────
      # Gate 3 — TypeScript strict
      # ─────────────────────────────────────────────
      - name: Gate 3 — Typecheck
        run: npm run typecheck

      # ─────────────────────────────────────────────
      # Gate 4 — Next.js production build
      # ─────────────────────────────────────────────
      - name: Gate 4 — Build
        run: npm run build

      # ─────────────────────────────────────────────
      # Gate 5 — Unit tests + coverage thresholds
      # (≥ 70% عام، ≥ 90% critical modules)
      # ─────────────────────────────────────────────
      - name: Gate 5 — Unit tests + coverage
        run: npm run test:unit

      # ─────────────────────────────────────────────
      # Gate 6 — Integration tests (Neon ephemeral branch)
      # Phase 1a: tests use `describe.skipIf(!HAS_DB)` — skip gracefully without TEST_DATABASE_URL.
      # When the secret is provisioned, integration suite flips from "placeholder" to "real".
      # ─────────────────────────────────────────────
      - name: Gate 6 — Integration tests
        run: npm run test:integration
        env:
          TEST_DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET || 'ci-fallback-secret-at-least-32-chars-long' }}

      # ─────────────────────────────────────────────
      # Gate 7 — API contract check (OpenAPI drift)
      # ─────────────────────────────────────────────
      - name: Gate 7 — OpenAPI drift
        run: npm run openapi:drift

      # ─────────────────────────────────────────────
      # Gate 8 — Migration check (up + down + empty DB)
      # ─────────────────────────────────────────────
      - name: Gate 8 — Migration check
        run: npm run db:migrate:check
        env:
          DATABASE_URL: ${{ secrets.TEST_DATABASE_URL }}

      # ─────────────────────────────────────────────
      # Gate 9 — Authorization matrix tests
      # ─────────────────────────────────────────────
      - name: Gate 9 — Authorization tests
        run: npm run test:authz

      # ─────────────────────────────────────────────
      # Gate 10 — Regression pack (permanent critical flows — D-78 §2)
      # login, orders, delivery, invoice, treasury, permissions,
      # idempotency, snapshots, soft-delete, /api/v1 compat, Android-ready
      # ─────────────────────────────────────────────
      - name: Gate 10 — Regression pack
        run: npm run test:regression

      # ─────────────────────────────────────────────
      # Gate 11 — E2E smoke (Playwright Chrome 120)
      # ─────────────────────────────────────────────
      - name: Gate 11 — E2E smoke
        run: npm run test:e2e:smoke

      # ─────────────────────────────────────────────
      # Gate 12 — Performance smoke (p95 budget)
      # ─────────────────────────────────────────────
      - name: Gate 12 — Performance smoke
        run: npm run test:perf

      # ─────────────────────────────────────────────
      # Gate 13 — Accessibility + Logging smoke
      # ─────────────────────────────────────────────
      - name: Gate 13a — Accessibility smoke
        run: npm run test:a11y

      - name: Gate 13b — Logging/monitoring smoke
        run: npm run test:logs

      # ─────────────────────────────────────────────
      # Upload coverage artifact (reviewed per PR)
      # ─────────────────────────────────────────────
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage/
          retention-days: 30

# ═══════════════════════════════════════════════════════════════
# ملاحظات التنفيذ (D-75 + D-78):
# - كل gate blocking: فشل أيٍّ = CI أحمر = لا merge.
# - بعض gates تعود no-op حالياً (echo placeholders في package.json)
#   حتى الـ feature code يُضاف تدريجياً في Phase 0..6.
#   تُفعَّل تلقائياً عند استبدال الـ script بالأمر الحقيقي.
# - Scope-based conditional tests (D-78 §6) تُشغَّل يدوياً عبر workflow_dispatch
#   أو تُدمج تلقائياً عبر path filters في PR.
# - Coverage thresholds مُكوَّنة في vitest.config.ts (lines thresholds).
# ═══════════════════════════════════════════════════════════════
